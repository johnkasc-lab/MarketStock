name: Intraday Stock Scanner - Project 1

on:
  schedule:
    - cron: '*/5 3-10 * * 1-5'
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install yfinance pandas requests schedule python-dotenv

      - name: Reset daily alert file if new day
        run: |
          python3 - << 'EOF'
          import os, pandas as pd
          from datetime import datetime, timezone, timedelta
          ist = datetime.now(timezone(timedelta(hours=5, minutes=30)))
          today = ist.strftime("%Y-%m-%d")
          f = "alerted_today.csv"
          if os.path.exists(f):
              df = pd.read_csv(f)
              if "Date" in df.columns and len(df) > 0:
                  if df["Date"].iloc[0] != today:
                      print(f"New day detected ({today}) — resetting {f}")
                      pd.DataFrame(columns=["Date","Ticker","Strategy"]).to_csv(f, index=False)
                  else:
                      print(f"Same day ({today}) — keeping {f}")
              else:
                  pd.DataFrame(columns=["Date","Ticker","Strategy"]).to_csv(f, index=False)
          else:
              print(f"{f} not found — will be created by scanner")
          EOF

      - name: Run scanner
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          LIVE_TRADING: ${{ secrets.LIVE_TRADING }}
          TRADING_CAPITAL: ${{ secrets.TRADING_CAPITAL }}
        run: |
          python scheduler_project1.py --single-run

      - name: Commit updated CSV files back to repo
        run: |
          git config --global user.name "Intraday Bot"
          git config --global user.email "bot@noreply.github.com"
          git add intraday_trades.csv alerted_today.csv open_positions.csv trade_ledger.csv
          git diff --staged --quiet || git commit -m "Auto-update trade logs $(date -u) [skip ci]"
          git push
